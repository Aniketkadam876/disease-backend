services:
  - type: web
    name: disease-prediction-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: MYSQLHOST
        value: <your railway host>
      - key: MYSQLUSER
        value: <your railway user>
      - key: MYSQLPASSWORD
        value: <your railway password>
      - key: MYSQLDATABASE
        value: railway
      - key: MYSQLPORT
        value: "3306"